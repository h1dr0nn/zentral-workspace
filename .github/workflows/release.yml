name: Release

on:
  push:
    tags:
      - 'develop-v*'
      - 'release-v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#develop-v}"
          VERSION="${VERSION#release-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == develop-v* ]]; then
            echo "is_draft=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_draft=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch version in config files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          # tauri.conf.json
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
          "
          # package.json
          npm version "$VERSION" --no-git-tag-version --allow-same-version || true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zentral v${{ steps.version.outputs.version }}'
          releaseBody: 'Download and install Zentral v${{ steps.version.outputs.version }}'
          releaseDraft: ${{ steps.version.outputs.is_draft == 'true' }}
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
